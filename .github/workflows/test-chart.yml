name: Test Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:


env:
  CHALKULAR_CONTROLLER_IMG: chalkular-controller:ci
  CHALKULAR_DOWNLOADER_IMG: chalkular-downloader:ci
  CHALKULAR_UPLOADER_IMG: chalkular-uploader:ci
  DOCKER_ARGS:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster

      - name: Prepare chalkular
        run: |
          go mod tidy
          make docker-build-all
          kind load docker-image $CHALKULAR_CONTROLLER_IMG
          kind load docker-image $CHALKULAR_DOWNLOADER_IMG
          kind load docker-image $CHALKULAR_UPLOADER_IMG
          make clean-helm build-helm

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Verify Helm installation
        run: helm version

      - name: Lint Helm Chart
        run: |
          helm lint ./dist/chart


      - name: Install cert-manager via Helm (wait for readiness)
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait \
            --timeout 300s

      - name: Install ocular via Helm (wait for readiness)
        run: |
          helm repo add crashoverride https://crashappsec.github.io/helm-charts
          helm repo update
          helm install ocular crashoverride/ocular \
            --namespace ocular-system \
            --create-namespace \
            --set crds.enablde=true \
            --wait \
            --timeout 300s

        # TODO: Uncomment if Prometheus is enabled
        #      - name: Install Prometheus Operator CRDs
        #        run: |
        #          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        #          helm repo update
        #          helm install prometheus-crds prometheus-community/prometheus-operator-crds

      - name: Install Helm chart for project
        run: |
          helm install my-release ./dist/chart --create-namespace --namespace chalkular-system

      - name: Check Helm release status
        run: |
          helm status my-release --namespace chalkular-system
